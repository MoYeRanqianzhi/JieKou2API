<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>授权中...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{text-align:center;padding:40px}
.spinner{width:24px;height:24px;border:2px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#666;font-size:13px}
.done{color:#4f4;font-size:14px;display:none}
</style>
</head>
<body>
<div class="card">
<div class="spinner" id="spinner"></div>
<p id="status">等待授权完成...</p>
<p class="done" id="done">授权成功，窗口将自动关闭</p>
</div>
<script>
const params=new URLSearchParams(location.search);
const url=params.get('url');
const fp=params.get('fp');
const fph=params.get('fph');
const exp=params.get('exp');

if(url){
  const child=window.open(url,'_blank');
  const timer=setInterval(()=>{
    fetch(`/public/oauth/poll?fp=${fp}&fph=${fph}&exp=${exp}`)
      .then(r=>r.json())
      .then(d=>{
        if(d.done){
          clearInterval(timer);
          document.getElementById('spinner').style.display='none';
          document.getElementById('status').style.display='none';
          document.getElementById('done').style.display='block';
          if(child)child.close();
          setTimeout(()=>window.close(),1500);
        }
      }).catch(()=>{});
  },3000);
}
</script>
</body>
</html>
